<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Financial News Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #38bdf8;
            --sentiment-bullish: #22c55e;
            --sentiment-bearish: #ef4444;
            --sentiment-neutral: #94a3b8;
            --border-color: #334155;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.011em;
        }

        .form-control,
        .form-select {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .form-control:focus,
        .form-select:focus {
            background-color: var(--card-bg);
            border-color: var(--accent-primary);
            color: var(--text-main);
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25);
        }

        .btn-primary {
            background-color: var(--accent-primary);
            border: none;
            color: #0f172a;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #7dd3fc;
            color: #0f172a;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            border-color: var(--accent-primary);
        }

        .sentiment-BULLISH {
            border-top: 3px solid var(--sentiment-bullish);
        }

        .sentiment-BEARISH {
            border-top: 3px solid var(--sentiment-bearish);
        }

        .sentiment-NEUTRAL {
            border-top: 3px solid var(--sentiment-neutral);
        }

        .badge-BULLISH {
            background-color: rgba(34, 197, 94, 0.1);
            color: var(--sentiment-bullish);
            border: 1px solid var(--sentiment-bullish);
        }

        .badge-BEARISH {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--sentiment-bearish);
            border: 1px solid var(--sentiment-bearish);
        }

        .badge-NEUTRAL {
            background-color: rgba(148, 163, 184, 0.1);
            color: var(--sentiment-neutral);
            border: 1px solid var(--sentiment-neutral);
        }

        .news-link {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            line-height: 1.4;
        }

        .news-link:hover {
            color: var(--accent-primary);
        }

        #summaryCard {
            background: linear-gradient(145deg, #1e293b, #111827);
        }

        hr {
            border-color: var(--border-color);
            opacity: 1;
        }

        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold mb-2">Market Intelligence</h1>
            <p class="text-muted">Real-time financial news search &amp; sentiment analysis</p>
        </div>
        <div class="row justify-content-center mb-5">
            <div class="col-md-8 col-lg-6">
                <form class="d-flex gap-2" id="searchForm">
                    <input class="form-control form-control-lg" id="ticker"
                        placeholder="Enter ticker (e.g., AAPL, GOTO)" required="" type="text" />
                    <select class="form-select" id="timeRange" style="max-width: 140px;">
                        <option value="1d">Last 24h</option>
                        <option selected="" value="7d">7 Days</option>
                        <option value="30d">30 Days</option>
                    </select>
                    <button class="btn btn-primary px-4" id="searchBtn" type="submit">Analyze</button>
                </form>
            </div>
        </div>
        <div class="text-center d-none my-5" id="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted" id="loadingText">Retrieving market data...</p>
        </div>
        <div class="mb-5 d-none" id="summarySection">
            <div class="card shadow-lg" id="summaryCard">
                <div class="card-body p-4">
                    <div class="row align-items-center">
                        <div class="col-md-5 text-center border-md-end border-secondary">
                            <h6 class="text-uppercase text-muted small fw-bold mb-2">Market Consensus</h6>
                            <h1 class="display-5 fw-bold mb-0" id="overallSentiment"></h1>
                            <p class="text-muted small mt-2 mb-0" id="totalScore"></p>
                        </div>
                        <div class="col-md-7 ps-md-4 mt-4 mt-md-0">
                            <div style="height: 180px;">
                                <canvas id="sentimentChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="mb-4 d-none text-muted small text-uppercase fw-bold border-bottom pb-2 border-secondary"
            id="resultsCount"></div>
        <div class="row g-4" id="results"></div>
        <div class="alert alert-danger bg-danger text-white border-0 d-none" id="error"></div>
    </div>
    <script>
        const sentimentEnabled = {{ sentiment_enabled| tojson }};

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const ticker = document.getElementById('ticker').value.trim().toUpperCase();
            const timeRange = document.getElementById('timeRange').value;
            const loadingText = document.getElementById('loadingText');

            document.getElementById('loading').classList.remove('d-none');
            loadingText.textContent = 'Fetching news articles...';
            document.getElementById('results').innerHTML = '';
            document.getElementById('error').classList.add('d-none');
            document.getElementById('resultsCount').classList.add('d-none');
            document.getElementById('summarySection').classList.add('d-none');

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker, time_range: timeRange })
                });

                const data = await response.json();

                if (response.ok) {
                    await processWithProgress(data, loadingText);
                } else {
                    showError(data.error || 'Connection error');
                    document.getElementById('loading').classList.add('d-none');
                }
            } catch (err) {
                showError('Failed to connect to terminal server');
                document.getElementById('loading').classList.add('d-none');
            }
        });

        let sentimentChart = null;

        async function processWithProgress(data, loadingText) {
            const resultsEl = document.getElementById('results');
            const countEl = document.getElementById('resultsCount');

            countEl.textContent = `${data.count} matches found for ticker: ${data.ticker}`;
            countEl.classList.remove('d-none');

            if (data.results.length === 0) {
                resultsEl.innerHTML = '<div class="col-12"><p class="text-muted text-center py-5">No news coverage found for this ticker in selected period.</p></div>';
                document.getElementById('loading').classList.add('d-none');
                return;
            }

            // Render immediate results
            resultsEl.innerHTML = '';
            data.results.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'col-md-6 col-lg-4 mb-2';
                card.id = `card-${index}`;

                const badgeHtml = sentimentEnabled ? '<span class="badge bg-secondary border-0 text-white opacity-50">Pending Analysis...</span>' : '';

                card.innerHTML = `
                    <div class="card h-100 shadow-sm border-light">
                        <div class="card-body d-flex flex-column">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                ${badgeHtml}
                                <span class="text-uppercase small fw-bold text-muted">${item.region || 'Global'}</span>
                            </div>
                            <h6 class="card-title mb-3">
                                <a href="${item.link}" target="_blank" class="news-link">
                                    ${item.title}
                                </a>
                            </h6>
                            <div class="mt-auto pt-3 border-top border-secondary">
                                <div class="d-flex justify-content-between text-muted" style="font-size: 0.75rem;">
                                    <span>${item.source}</span>
                                    <span>${item.published || ''}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                resultsEl.appendChild(card);
            });

            const total = data.results.length;
            let bullish = 0, bearish = 0, neutral = 0, score = 0;

            if (sentimentEnabled) {
                for (let i = 0; i < total; i++) {
                    loadingText.textContent = `Analyzing sentiment ${i + 1} of ${total}...`;

                    try {
                        const res = await fetch('/analyze', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ title: data.results[i].title })
                        });
                        const analysis = await res.json();
                        const sentiment = analysis.sentiment;

                        if (sentiment === 'BULLISH') { bullish++; score++; }
                        else if (sentiment === 'BEARISH') { bearish++; score--; }
                        else { neutral++; }

                        updateCardUI(i, data.results[i], sentiment);
                    } catch (err) {
                        console.error("Analysis Error:", err);
                        updateCardUI(i, data.results[i], 'NEUTRAL');
                        neutral++;
                    }
                }

                document.getElementById('loading').classList.add('d-none');
                renderSummary({
                    bullish, bearish, neutral, score,
                    overall: score > 0 ? 'BULLISH' : (score < 0 ? 'BEARISH' : 'NEUTRAL')
                });
            } else {
                for (let i = 0; i < total; i++) {
                    updateCardUI(i, data.results[i], null);
                }
                document.getElementById('loading').classList.add('d-none');
            }
        }

        function updateCardUI(index, item, sentiment) {
            const cardContainer = document.getElementById(`card-${index}`);
            const sentimentClass = sentiment ? `sentiment-${sentiment}` : '';
            const badgeHtml = sentiment ? `<span class="badge badge-${sentiment}">${sentiment}</span>` : '';

            cardContainer.innerHTML = `
                <div class="card h-100 shadow-sm ${sentimentClass}">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            ${badgeHtml}
                            <span class="text-uppercase small fw-bold text-muted">${item.region || 'Global'}</span>
                        </div>
                        <h6 class="card-title mb-3">
                            <a href="${item.link}" target="_blank" class="news-link">
                                ${item.title}
                            </a>
                        </h6>
                        <div class="mt-auto pt-3 border-top border-secondary">
                            <div class="d-flex justify-content-between text-muted" style="font-size: 0.75rem;">
                                <span>${item.source}</span>
                                <span>${item.published || ''}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSummary(summary) {
            const summarySection = document.getElementById('summarySection');
            const overallEl = document.getElementById('overallSentiment');
            const scoreEl = document.getElementById('totalScore');

            summarySection.classList.remove('d-none');
            overallEl.textContent = summary.overall;

            if (summary.overall === 'BULLISH') overallEl.style.color = '#22c55e';
            else if (summary.overall === 'BEARISH') overallEl.style.color = '#ef4444';
            else overallEl.style.color = '#94a3b8';

            scoreEl.innerHTML = `<span class="text-white">Aggregate Score: ${summary.score > 0 ? '+' : ''}${summary.score}</span><br>Scale: Bullish (+1), Bearish (-1), Neutral (0)`;

            const ctx = document.getElementById('sentimentChart').getContext('2d');
            if (sentimentChart) {
                sentimentChart.destroy();
            }
            sentimentChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['BULLISH', 'BEARISH', 'NEUTRAL'],
                    datasets: [{
                        data: [summary.bullish, summary.bearish, summary.neutral],
                        backgroundColor: ['#22c55e', '#ef4444', '#475569'],
                        borderRadius: 4,
                        barThickness: 25
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { color: '#334155', drawBorder: false },
                            ticks: { color: '#94a3b8' }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8', font: { weight: 'bold' } }
                        }
                    }
                }
            });
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.remove('d-none');
        }
    </script>
</body>

</html>
